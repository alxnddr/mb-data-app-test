description: 'Nano semantic layer (fact): one row per coupon redemption, enriched with coupon, order, and user attributes. Materializes the discount math (orders.total_cents does NOT include the coupon discount, so discount_amount_cents = round(subtotal_cents * discount_pct / 100) and revenue_after_discount_cents = total_cents - discount_amount_cents) so every analyst gets the same answer. Powers the Coupon Effectiveness dashboard and the Library/Metrics coupon measures.'
entity_id: yBBaUrx0OyPH8TW02zoGD
name: coupon_redemptions_enric1hed
owner_user_id: api-key-user-1830fb63-6450-468c-88f5-191cbf69bfd9@api-key.invalid
source:
  query:
    database: neondb
    stages:
    - native: |-
        SELECT
          cr.id                                                                AS redemption_id,
          cr.redeemed_at                                                       AS redeemed_at,
          cr.redeemed_at::date                                                 AS redemption_date,

          c.id                                                                 AS coupon_id,
          c.code                                                               AS coupon_code,
          c.discount_pct                                                       AS discount_pct,
          c.valid_from                                                         AS valid_from,
          c.valid_until                                                        AS valid_until,
          c.max_redemptions                                                    AS max_redemptions,
          (c.valid_until - c.valid_from)                                       AS coupon_lifetime_days,

          o.id                                                                 AS order_id,
          o.status                                                             AS order_status,
          o.placed_at                                                          AS order_placed_at,
          o.subtotal_cents                                                     AS subtotal_cents,
          o.tax_cents                                                          AS tax_cents,
          o.shipping_cents                                                     AS shipping_cents,
          o.total_cents                                                        AS total_cents,

          round(o.subtotal_cents * c.discount_pct / 100.0)::int                AS discount_amount_cents,
          (o.total_cents - round(o.subtotal_cents * c.discount_pct / 100.0))::int AS revenue_after_discount_cents,

          (cr.redeemed_at::date BETWEEN c.valid_from AND c.valid_until)        AS is_within_valid_window,
          (cr.redeemed_at::date - c.valid_from)                                AS days_since_coupon_start,
          (c.valid_until - cr.redeemed_at::date)                               AS days_until_expiry_at_redemption,

          u.id                                                                 AS user_id,
          u.email                                                              AS user_email,
          u.country_code                                                       AS country_code,
          u.created_at                                                         AS user_created_at,

          (o.placed_at = MIN(o.placed_at) OVER (PARTITION BY u.id))            AS is_first_order_for_user
        FROM public.coupon_redemptions cr
        JOIN public.coupons c ON c.id = cr.coupon_id
        JOIN public.orders  o ON o.id = cr.order_id
        JOIN public.users   u ON u.id = o.user_id
      lib/type: mbql.stage/native
    lib/type: mbql/query
  type: query
source_database_id: neondb
