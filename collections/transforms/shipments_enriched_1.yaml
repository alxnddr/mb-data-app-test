description: 'Nano semantic layer (fact): one row per shipment, enriched from orders. Adds order_value, is_delivered, transit_days, processing_days, shipped_date. Powers the shipments analysis dashboard.'
entity_id: kPvrkL8_vwQa5MaMUxaoA
name: shipments_enriched 1
owner_user_id: api-key-user-d03440c3-d6dd-4436-9c12-671fd7462a75@api-key.invalid
source:
  query:
    database: neondb
    stages:
    - native: |-
        SELECT
          s.id                                  AS shipment_id,
          s.order_id                            AS order_id,
          s.carrier                             AS carrier,
          s.status                              AS status,
          o.placed_at                           AS placed_at,
          s.shipped_at                          AS shipped_at,
          s.delivered_at                        AS delivered_at,
          s.shipped_at::date                    AS shipped_date,
          round(o.total_cents / 100.0, 2)       AS order_value,
          (s.status = 'delivered')::int         AS is_delivered,
          CASE WHEN s.delivered_at IS NOT NULL
               THEN round((EXTRACT(EPOCH FROM (s.delivered_at - s.shipped_at)) / 86400.0)::numeric, 2)
          END                                   AS transit_days,
          round((EXTRACT(EPOCH FROM (s.shipped_at - o.placed_at)) / 86400.0)::numeric, 2) AS processing_days
        FROM public.shipments s
        JOIN public.orders o ON o.id = s.order_id
      lib/type: mbql.stage/native
    lib/type: mbql/query
  type: query
source_database_id: neondb
